services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: intensivista-api
    environment:
      API_PORT: 3333
      JWT_SECRET: troque-esta-chave-em-producao
    ports:
      - "3333:3333"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3333
    container_name: intensivista-web
    depends_on:
      - api
    ports:
      - "8080:80"
